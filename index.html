<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lepaa Brew Planner</title><meta name="description" content="Advanced Brewing Schedule & Calculation Tool"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet"><script defer="defer" src="bundle.22ff81a7c3cdc663b543.js"></script></head><body><header id="main-header"><nav class="container-fluid"><div class="logo" data-i18n="brand_name">Lepaa Brew</div><div class="controls"></div></nav></header><main class="planner-wrapper"><div class="gantt-container"><div id="setup-overlay" class="setup-overlay"><div class="setup-card"><h2 data-i18n="setup_title">Brew Planning Setup</h2><div class="form-group"><label for="start-time" data-i18n="lbl_start_time">Start Time:</label> <input type="time" id="start-time"></div><div class="form-group"><label for="recipe-select" data-i18n="lbl_recipe">Select Recipe:</label> <select id="recipe-select"><option value="pale_ale" data-i18n="recipe_pale_ale">Pale Ale</option><option value="helles" data-i18n="recipe_helles">Helles</option><option value="saison" data-i18n="recipe_saison">Saison</option></select></div><button id="start-brewing-btn" class="btn btn-primary" data-i18n="btn_start_brewing">Start Brewing</button></div></div><div class="gantt-body" id="gantt-chart" style="display: none;"><div class="time-header-cell sticky-header" data-i18n="header_time">Time</div><div class="column-header sticky-header" data-col="cleaning" data-i18n="header_washing">Washing</div><div class="column-header sticky-header" data-col="brewing" data-i18n="header_brewing">Brewing</div><div class="time-axis" id="time-axis"></div><div class="grid-background"><div class="grid-col" data-col="cleaning"></div><div class="grid-col" data-col="brewing"></div></di
